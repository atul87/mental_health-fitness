name: SoulCare CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ───────────────────────────────────────────────
  backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    env:
      PORT: 3003
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

  # ─── Frontend Tests + Build ─────────────────────────────────────
  frontend:
    name: ⚡ Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mental-health

    env:
      VITE_API_URL: http://localhost:3003

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Mental-health/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test

      - name: Run coverage report
        run: npm run coverage

      - name: Lint check
        run: npm run lint

      - name: Build frontend
        run: npm run build
